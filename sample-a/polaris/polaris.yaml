replicaCount: 1

image:
  repository: apache/polaris
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    - name: polaris-http
      port: 8181
      targetPort: 0
      protocol: TCP

extraEnv:
  - name: POLARIS_BOOTSTRAP_CREDENTIALS
    valueFrom:
      secretKeyRef:
        name: polaris-root-credentials
        key: credentials
  - name: AWS_REGION
    value: us-east-1
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: polaris-s3-credentials
        key: access_key_id
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: polaris-s3-credentials
        key: secret_access_key

extraServices: []

ingress:
  enabled: false
gateway:
  enabled: false
httproute:
  enabled: false

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

persistence:
  type: in-memory

features:
  SUPPORTED_CATALOG_STORAGE_TYPES:
    - S3

authentication:
  type: internal
  tokenBroker:
    type: rsa-key-pair
    maxTokenGeneration: PT1H
    secret:
      name: ""

serviceMonitor:
  enabled: false

metrics:
  enabled: false

tracing:
  enabled: false

storage:
  secret:
    name: "polaris-s3-credentials"
    awsAccessKeyId: "access_key_id"
    awsSecretAccessKey: "secret_access_key"

rateLimiter:
  type: no-op
