apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
data:
  spark-defaults.conf: |
    spark.jars.ivy                                             /tmp/ivy
    spark.jars.packages                                        org.apache.iceberg:iceberg-spark-runtime-4.1_2.13:1.11.0,org.apache.hadoop:hadoop-aws:3.4.2,org.slf4j:slf4j-simple:1.7.36

    spark.sql.extensions                                       org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

    spark.sql.catalog.sample_catalog                                  org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.sample_catalog.type                             rest
    spark.sql.catalog.sample_catalog.uri                              http://polaris.sample-a.svc.cluster.local:8181/api/catalog
    spark.sql.catalog.sample_catalog.prefix                           sample_catalog
    spark.sql.catalog.sample_catalog.warehouse                        sample_catalog
    spark.sql.catalog.sample_catalog.credential                       polaris-root-id:polaris-root-secret
    spark.sql.catalog.sample_catalog.oauth2-server-uri                http://polaris.sample-a.svc.cluster.local:8181/api/catalog/v1/oauth/tokens
    spark.sql.catalog.sample_catalog.scope                            PRINCIPAL_ROLE:ALL
    spark.sql.catalog.sample_catalog.rest.auth.type                   oauth2
    spark.sql.catalog.sample_catalog.rest-metrics-reporting-enabled   false
    spark.sql.catalog.sample_catalog.client.region                    us-east-1
    spark.sql.catalog.sample_catalog.s3.endpoint                      http://seaweedfs-all-in-one.sample-a.svc.cluster.local:8333
    spark.sql.catalog.sample_catalog.s3.path-style-access             true
    spark.sql.catalog.sample_catalog.s3.access-key-id                 query-engine-s3-access-key
    spark.sql.catalog.sample_catalog.s3.secret-access-key             query-engine-s3-secret-access-key
  log4j2.properties: |
    rootLogger.level = error
    rootLogger.appenderRef.stdout.ref = console

    appender.console.type = Console
    appender.console.name = console
    appender.console.target = SYSTEM_ERR
    appender.console.layout.type = PatternLayout
    appender.console.layout.pattern = %d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n%ex
---
apiVersion: v1
kind: Pod
metadata:
  name: spark-sql
spec:
  containers:
  - name: spark-sql
    image: spark:4.1.2
    command: ["sleep", "inf"]
    env:
    - name: SPARK_HOME
      value: /opt/spark
    - name: HOME
      value: /tmp
    volumeMounts:
    - name: spark-config
      mountPath: /opt/spark/conf/spark-defaults.conf
      subPath: spark-defaults.conf
    - name: spark-config
      mountPath: /opt/spark/conf/log4j2.properties
      subPath: log4j2.properties
    - name: ivy-cache
      mountPath: /tmp/ivy
  volumes:
  - name: spark-config
    configMap:
      name: spark-config
  - name: ivy-cache
    emptyDir: {}
  terminationGracePeriodSeconds: 0
  restartPolicy: Never
